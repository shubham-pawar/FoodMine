@if (tags) {
  <div [style.justifyContent] = "JustifyContent">
    @for (tag of tags; track tag) {
      <a routerLink="/tag/{{tag.name}}">
        {{tag.name}}({{tag.count}})
      </a>
    }
  </div>
}

@if (foodPageTags) {
  <div [style.justifyContent] = "JustifyContent">
    @for (tagName of foodPageTags; track tagName) {
      <a routerLink="/tag/{{tagName}}">
        {{tagName}}
      </a>
    }
  </div>
}
