<app-search></app-search>
<app-tags></app-tags>
<app-not-found [visible]="!foods || foods.length <=0" resetLinkText="Reset Search"></app-not-found>
<ul>
  @for (food of foods; track food) {
    <li>
      <a routerLink="/food/{{food.id}}">
        <img src="{{food.imageUrl}}" alt="dish">
        <div class="content">
          <div class="name">
            {{food.name}}
          </div>
          <span class="favorite {{food.favorite?'':'not'}}">
            🤍
          </span>
          <div class="stars">
            {{food.stars}}
          </div>
          <div class="product-item-footer">
            <div class="origins">
              @for (origin of food.origins; track origin) {
                <span>
                  {{origin}}
                </span>
              }
            </div>
            <div class="cook-time">
              <span>🕒</span>
              {{food.cookTime}}
            </div>
          </div>
          <div class="price">
            <span>
              {{food.price|currency}}
            </span>
          </div>
        </div>
      </a>
    </li>
  }
</ul>
